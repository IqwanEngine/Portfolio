<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <!-- Definition for glows and style -->
  <defs>
    <filter id="crimson-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- CHESS KNIGHT (Left side, detailed vector contours) -->
    <path id="chess-knight" d="
      M 160,240 
      L 220,240 
      C 220,220 215,200 215,185 
      C 215,170 225,155 230,140 
      C 235,125 220,105 205,100 
      C 190,95 175,95 165,105 
      C 155,115 150,130 150,140 
      C 135,145 125,155 115,165 
      C 105,175 110,190 120,200 
      C 130,210 145,215 150,230 
      Z" 
      fill="#ef4444" fill-opacity="0.1" 
      filter="url(#crimson-glow)"
    />
    
    <!-- Base stand for Chess Knight -->
    <path d="M 140,240 L 230,240 L 220,255 L 150,255 Z" fill="#ef4444" />
    <path d="M 130,255 L 240,255" stroke-width="8" />

    <!-- LETTER E (Right side, matching serif structure) -->
    <g transform="translate(230, 0)" stroke-width="8" filter="url(#crimson-glow)">
      <!-- Main vertical stem -->
      <path d="M 50,100 L 50,250" />
      <!-- Top arm with serif -->
      <path d="M 50,100 L 150,100 M 150,100 L 150,115" />
      <!-- Middle arm -->
      <path d="M 50,175 L 130,175" />
      <!-- Bottom arm with serif -->
      <path d="M 50,250 L 160,250 M 160,250 L 160,235" />
      <!-- Top/bottom serifs on stem -->
      <path d="M 35,100 L 65,100 M 35,250 L 65,250" />
    </g>

    <!-- PAPER AIRPLANE (Sleek line-art, model cutting diagonally across the monogram) -->
    <g filter="url(#crimson-glow)">
      <!-- Left Wing fold -->
      <polygon points="80,180 380,165 180,210" fill="black" stroke="#ffffff" stroke-width="4" />
      <!-- Right Wing fold -->
      <polygon points="180,210 380,165 240,210" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="4" />
      <!-- Under-carriage fold -->
      <polygon points="180,210 240,210 220,235" fill="#ef4444" stroke="#ef4444" stroke-width="3" />
    </g>
  </g>
</svg>
